name: C++ Design Patterns Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-run-pattern-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show compiler version
        run: g++ --version

      - name: Build and run pattern tests
        run: |
          set -euo pipefail
          ./scripts/run_tests.sh

  all-tests-passed:
    runs-on: ubuntu-latest
    needs: build-and-run-pattern-tests
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.build-and-run-pattern-tests.result }}" != "success" ]; then
            echo "❌ Some tests failed!"
            exit 1
          fi
          echo "✅ All tests passed successfully!"
